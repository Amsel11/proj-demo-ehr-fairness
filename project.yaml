name: Auditing Algorithmic Fairness in EHR Mortality Models
status: writing
description: >-
  A systematic audit of subgroup calibration and error-rate disparities across
  race, sex, and insurance status in widely deployed EHR mortality risk scores.
  We propose a reweighting-based mitigation that closes the largest disparities
  while preserving overall discrimination, evaluated on MIMIC-IV and a community
  hospital cohort.

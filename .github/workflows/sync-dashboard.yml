name: Sync to lab dashboard

# Runs whenever this project's project.yaml changes on main, and pushes the
# updated card into the central lab-dashboard repo.
on:
  push:
    branches: [main]
    paths:
      - project.yaml
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this project repo
        uses: actions/checkout@v4

      - name: Check out the dashboard repo
        uses: actions/checkout@v4
        with:
          # <-- change this to your dashboard repo (owner/name)
          repository: annelene/lab-dashboard
          token: ${{ secrets.DASHBOARD_TOKEN }}
          path: lab-dashboard

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run aggregator
        working-directory: lab-dashboard
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          export PROJECT_YAML="$(cat "$GITHUB_WORKSPACE/project.yaml")"
          python scripts/aggregate.py

      - name: Commit and push to dashboard
        working-directory: lab-dashboard
        run: |
          git config user.name "lab-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/projects.json
          if git diff --staged --quiet; then
            echo "No dashboard changes."
          else
            git commit -m "sync: update ${{ github.event.repository.name }}"
            git push
          fi
